- name: OpenShift Auto Recovery
  hosts: all
  sources:
    - ansible.eda.pg_listener:
        pg_port: 5432
  rules:
    - name: Application Down
      condition: event.alerts[0].labels.alertname == "DeploymentDown"
      action:
        run_job_template:
          name: eda-test
          organization: Default
    - name: CrashLoopBackOff Recovery
      condition: event.alerts[0].labels.alertname == "PodCrashLooping"
      action:
        run_job_template:
          name: gather_logs
          organization: Default
